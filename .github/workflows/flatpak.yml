name: Flatpak

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FLATPAK_ID: solutions.bmogroup.MIRA

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak xvfb appstream dbus-x11

      - name: Add Flathub remote user-wide
        run: |
          dbus-run-session -- flatpak remote-add --if-not-exists --user flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Install org.flatpak.Builder
        run: |
          dbus-run-session -- flatpak install -y flathub org.flatpak.Builder

      - name: Build Flatpak
        run: |
          dbus-run-session -- flatpak run --command=flathub-build org.flatpak.Builder --install \
            solutions.bmogroup.MIRA.yml

      - name: Lint manifest
        run: |
          dbus-run-session -- flatpak run --command=flatpak-builder-lint org.flatpak.Builder manifest solutions.bmogroup.MIRA.yml

      - name: Verify exported files
        run: |
          test -f repo/files/share/applications/${FLATPAK_ID}.desktop
          test -f repo/files/share/metainfo/${FLATPAK_ID}.metainfo.xml
          test -f repo/files/share/icons/hicolor/256x256/apps/${FLATPAK_ID}.png
          test -f repo/files/share/icons/hicolor/scalable/apps/${FLATPAK_ID}.svg
          appstreamcli validate --no-net --explain repo/files/share/metainfo/${FLATPAK_ID}.metainfo.xml

      - name: Lint repo
        run: |
          dbus-run-session -- flatpak run --command=flatpak-builder-lint org.flatpak.Builder repo repo

      - name: Install app from local repo
        run: |
          dbus-run-session -- flatpak install --user -y ./repo ${FLATPAK_ID}

      - name: Run smoke test
        run: |
          dbus-run-session -- xvfb-run -a sh -lc 'timeout 30s flatpak run ${FLATPAK_ID} || test $? -eq 124'

      - name: Build bundle
        run: |
          flatpak build-bundle repo mira.flatpak ${FLATPAK_ID}
          test -s mira.flatpak
