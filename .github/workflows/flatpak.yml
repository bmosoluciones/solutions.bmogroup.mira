name: Flatpak

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FLATPAK_ID: solutions.bmogroup.mira

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak xvfb appstream dbus-x11

      - name: Add Flathub remote user-wide
        run: |
          dbus-run-session -- flatpak remote-add --if-not-exists --user flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Install org.flatpak.Builder
        run: |
          dbus-run-session -- flatpak install -y flathub org.flatpak.Builder

      - name: Build Flatpak
        run: |
          dbus-run-session -- flatpak run --command=flathub-build org.flatpak.Builder --install \
            --disable-rofiles-fuse \
            solutions.bmogroup.mira.yml

      - name: Lint manifest
        run: |
          dbus-run-session -- flatpak run --command=flatpak-builder-lint org.flatpak.Builder manifest solutions.bmogroup.mira.yml

      - name: Verify exported files
        run: |
          set -euxo pipefail
          export_root="builddir/files/share"
          if [[ ! -d "${export_root}" ]]; then
            echo "::warning::${export_root} not found; listing workspace for diagnostics"
            find . -maxdepth 4 -type d | sort || true
          fi

          require_file() {
            local path="$1"
            if [[ ! -f "${path}" ]]; then
              echo "::error file=${path}::Expected file not found"
              echo "Exported files under ${export_root}:"
              find "${export_root}" -maxdepth 8 -type f | sort || true
              exit 1
            fi
          }

          require_file "${export_root}/applications/${FLATPAK_ID}.desktop"
          require_file "${export_root}/metainfo/${FLATPAK_ID}.metainfo.xml"
          require_file "${export_root}/icons/hicolor/256x256/apps/${FLATPAK_ID}.png"
          require_file "${export_root}/icons/hicolor/scalable/apps/${FLATPAK_ID}.svg"
          cat "${export_root}/metainfo/${FLATPAK_ID}.metainfo.xml"
          appstreamcli validate --no-net --explain "${export_root}/metainfo/${FLATPAK_ID}.metainfo.xml"

      - name: Lint repo
        run: |
          dbus-run-session -- flatpak run --command=flatpak-builder-lint org.flatpak.Builder repo repo

      - name: Install app from local repo
        run: |
          dbus-run-session -- flatpak install --user -y ./repo ${FLATPAK_ID}
